<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;min-height:100vh;background:#3aabf0;transition:background .4s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 14px 40px;gap:14px;text-align:center}
h1{
  background:linear-gradient(135deg,#fff 0%,#ffe066 40%,#ffb347 70%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-size:clamp(2.6rem,7vw,5rem);font-weight:900;letter-spacing:2px;
  filter:drop-shadow(0 0 18px rgba(255,220,80,.9)) drop-shadow(0 4px 0 rgba(0,0,0,.25));
  position:relative;z-index:1;line-height:1.1;width:100%;text-align:center
}
h2{
  background:linear-gradient(135deg,#ff6b6b 0%,#ff0000 50%,#cc0000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-size:clamp(1.1rem,3vw,2rem);font-weight:900;letter-spacing:10px;
  filter:drop-shadow(0 0 14px rgba(255,50,50,.9)) drop-shadow(0 2px 0 rgba(0,0,0,.3));
  position:relative;z-index:1;margin-top:-4px;width:100%;text-align:center
}
.bg-btn{width:28px;height:28px;border-radius:50%;border:2.5px solid rgba(255,255,255,.4);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.bg-btn.on{border-color:#fff;transform:scale(1.2)}
.row{display:flex;gap:8px;width:100%;justify-content:center}
select{flex:1;padding:12px 10px;border-radius:12px;border:3px solid rgba(255,255,255,0.45);font-weight:900;font-size:1rem;color:#1a6db5;background:rgba(255,255,255,0.82);outline:none;letter-spacing:1px;text-transform:uppercase;font-family:sans-serif}

/* DICE AREA — из файла 2 */
.dice{display:flex;flex-wrap:nowrap;gap:8px;justify-content:center;align-items:center;min-height:100px;width:100%;max-width:360px}
.die{
  width:96px;height:96px;
  flex:1 1 0;
  max-width:96px;
  aspect-ratio:1/1;
  border-radius:18px;
  border:4px solid rgba(255,255,255,0.9);
  box-shadow:0 6px 20px rgba(0,0,0,.35),inset 0 2px 6px rgba(255,255,255,.35),inset -2px -2px 6px rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  filter:saturate(1.25) brightness(1.1);
}

.die.spin{animation:spin .6s ease;background:#888 !important;filter:saturate(0) brightness(0.85)}
.die.spin .dot{display:none}
.die.spin::after{content:'?';font-size:2.2rem;font-weight:900;color:#fff;opacity:.9;text-shadow:0 2px 8px rgba(0,0,0,.3)}
@keyframes spin{0%{transform:rotate(0)scale(1)}30%{transform:rotate(-15deg)scale(.8)}60%{transform:rotate(10deg)scale(1.1)}100%{transform:rotate(0)scale(1)}}
.die.reveal{animation:reveal .45s cubic-bezier(.2,1.4,.4,1) both}
@keyframes reveal{0%{transform:scale(0) rotate(-20deg);opacity:0;filter:brightness(2.5) saturate(2)}40%{transform:scale(1.25) rotate(6deg);opacity:1;filter:brightness(1.6) saturate(1.8)}70%{transform:scale(0.9) rotate(-3deg);filter:brightness(1.2) saturate(1.4)}100%{transform:scale(1) rotate(0);filter:saturate(1.25) brightness(1.1)}}
.dot{width:16px;height:16px;border-radius:50%;background:#fff;opacity:.95;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%}
.tag{background:rgba(255,255,255,.25);color:#fff;font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
.tdot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6)}

/* === GLASS CARD === */
.glass-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1.5px solid rgba(255,255,255,0.38);
  border-radius:28px;
  padding:28px 22px 24px;
  box-shadow:0 10px 48px rgba(0,0,0,0.18),0 2px 0 rgba(255,255,255,0.28) inset,0 -1px 0 rgba(0,0,0,0.07) inset;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  width:100%;max-width:360px;flex:0 1 360px;
  position:relative;z-index:1;
}
.glass-card::before{
  content:'';position:absolute;inset:0;border-radius:28px;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.22) 0%,rgba(255,255,255,0.03) 55%,rgba(255,255,255,0.08) 100%);
}

.btn{width:100%;padding:14px;background:#f5c400;color:#111;font-size:1.1rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:14px;cursor:pointer;box-shadow:0 5px 0 #c89a00}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #c89a00}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-meow{width:100%;padding:11px;background:linear-gradient(135deg,#ff6fb7,#ffaaee);color:#fff;font-size:.95rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:14px;cursor:pointer;box-shadow:0 5px 0 #d94fa0;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn-meow:active{transform:translateY(4px);box-shadow:0 1px 0 #d94fa0}
.meow-pop{position:fixed;pointer-events:none;z-index:300;font-size:2rem;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3);animation:meowPop .9s ease-out both}
@keyframes meowPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-10deg)}25%{opacity:1;transform:translate(-50%,-80%) scale(1.15) rotate(5deg)}70%{opacity:1;transform:translate(-50%,-140%) scale(1) rotate(-3deg)}100%{opacity:0;transform:translate(-50%,-200%) scale(.8) rotate(0)}}
.btn-mega{width:100%;padding:14px;background:linear-gradient(135deg,#ff1744,#d500f9,#ff6d00);background-size:200% 200%;animation:megaGrad 3s ease infinite;color:#fff;font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:14px;cursor:pointer;box-shadow:0 0 24px rgba(213,0,249,.5),0 5px 0 rgba(0,0,0,.2);text-shadow:0 2px 6px rgba(0,0,0,.4)}
.btn-mega:active{transform:translateY(4px)}
.btn-mega:disabled{opacity:.55;cursor:not-allowed;animation:none}
@keyframes megaGrad{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

.sound-wrap{position:fixed;top:14px;right:14px;z-index:999;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.sound-btn{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.22);border:1.5px solid rgba(255,255,255,.35);border-radius:20px;padding:5px 11px;backdrop-filter:blur(10px);cursor:pointer;font-size:12px;font-weight:800;color:rgba(255,255,255,.9);letter-spacing:1px;user-select:none;transition:background .2s,opacity .2s}
.sound-btn:hover{background:rgba(0,0,0,.38)}
.sound-btn.muted{opacity:.5}
.sttrack{width:28px;height:16px;border-radius:8px;background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.35);position:relative;flex-shrink:0;transition:background .25s}
.sound-btn:not(.muted) .sttrack{background:#f5c400;border-color:#f5c400}
.stthumb{width:10px;height:10px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.sound-btn:not(.muted) .stthumb{transform:translateX(12px)}
.bgs-panel{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:6px;max-width:120px;background:rgba(0,0,0,.22);border:1.5px solid rgba(255,255,255,.25);border-radius:14px;padding:8px;backdrop-filter:blur(10px)}

.page-wrap{display:flex;align-items:center;justify-content:center;gap:48px;width:100%;position:relative;z-index:1}
@media(min-width:600px){h1,h2{padding-right:212px}}

.colors-panel{background:rgba(0,25,70,.32);backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,.28);border-radius:18px;padding:18px 16px;width:200px;flex-shrink:0;display:none}
@media(min-width:600px){.colors-panel{display:flex;flex-direction:column;gap:0}}
.colors-title{font-size:.85rem;font-weight:900;letter-spacing:.2em;color:rgba(255,255,255,.75);text-transform:uppercase;margin-bottom:10px;text-align:center}
.color-row{display:flex;align-items:center;gap:12px;padding:9px 6px;border-bottom:1px solid rgba(255,255,255,.1);text-align:left}
.color-row:last-child{border-bottom:none}
.color-row.matched{background:rgba(255,255,255,.18);border-radius:8px}
.swatch{width:38px;height:28px;border-radius:8px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.35)}
.cname{font-size:1rem;font-weight:900;color:#fff}
.cdesc{font-size:.78rem;font-weight:700;color:rgba(255,255,255,.5)}

.colors-panel-bottom{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.28);border-radius:16px;padding:14px;backdrop-filter:blur(10px)}
@media(min-width:600px){.colors-panel-bottom{display:none}}
.colors-title-b{font-size:.72rem;font-weight:900;letter-spacing:.2em;color:rgba(255,255,255,.85);text-transform:uppercase;margin-bottom:12px}
.color-row-b{display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,.15);text-align:left}
.color-row-b:last-child{border-bottom:none}
.color-row-b.matched{background:rgba(255,255,255,.2);border-radius:8px}
.swatch-b{width:38px;height:26px;border-radius:7px;flex-shrink:0;border:1.5px solid rgba(255,255,255,.4)}

#brainrotCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;display:none}
body.brainrot-bg #brainrotCanvas{display:block}
#ghoulCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;display:none}
body.ghoul-bg #ghoulCanvas{display:block}

.streak-badge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:400;pointer-events:none;font-size:clamp(2rem,8vw,4rem);font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,200,0,.9),3px 4px 0 rgba(0,0,0,.5);animation:streakPop 1.4s cubic-bezier(.2,.8,.3,1) both}
@keyframes streakPop{0%{transform:translate(-50%,-50%) scale(0) rotate(-12deg);opacity:0}18%{transform:translate(-50%,-50%) scale(1.3) rotate(4deg);opacity:1}35%{transform:translate(-50%,-50%) scale(.95) rotate(-2deg);opacity:1}55%{transform:translate(-50%,-50%) scale(1.05) rotate(1deg);opacity:1}75%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}100%{transform:translate(-50%,-60%) scale(.8) rotate(0);opacity:0}}

#megaOverlay{position:fixed;inset:-40px;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;opacity:0;pointer-events:none;transition:opacity .4s ease;background:radial-gradient(ellipse 80% 80% at 50% 40%,#120030 0%,#000510 60%,#000 100%);overflow:hidden}
#megaOverlay::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 50% 40% at 50% 20%,rgba(213,0,249,.18) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 20% 80%,rgba(255,23,68,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(41,121,255,.12) 0%,transparent 70%);animation:megaBgPulse 3s ease-in-out infinite alternate}
@keyframes megaBgPulse{from{opacity:.6}to{opacity:1}}
#megaOverlay.show{opacity:1;pointer-events:all}
#megaOverlay.shake{animation:screenShake .4s ease both}
@keyframes screenShake{0%{transform:translate(0)}10%{transform:translate(-12px,7px)}20%{transform:translate(12px,-7px)}30%{transform:translate(-10px,5px)}40%{transform:translate(10px,-5px)}60%{transform:translate(-5px,3px)}80%{transform:translate(5px,-2px)}100%{transform:translate(0)}}
.mega-title{font-size:clamp(36px,7vw,68px);color:#fff;font-weight:900;text-transform:uppercase;letter-spacing:4px;position:relative;z-index:1;text-shadow:0 0 40px rgba(213,0,249,.9),0 0 80px rgba(255,23,68,.5),3px 4px 0 rgba(0,0,0,.6);animation:megaTitlePulse .9s ease-in-out infinite alternate}
@keyframes megaTitlePulse{from{text-shadow:0 0 30px rgba(213,0,249,.7),0 0 60px rgba(255,23,68,.4),3px 4px 0 rgba(0,0,0,.6);letter-spacing:4px}to{text-shadow:0 0 70px #d500f9,0 0 130px rgba(255,23,68,.9),3px 4px 0 rgba(0,0,0,.6);letter-spacing:5px}}
.mega-subtitle{font-size:14px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:rgba(255,200,255,.45);position:relative;z-index:1;margin-top:-18px}
.mega-dice-row{display:flex;gap:18px;justify-content:center;align-items:flex-end;min-height:150px;position:relative;z-index:1;flex-wrap:wrap}
.mega-dice{width:115px;height:115px;border-radius:22px;border:6px solid #fff;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);box-shadow:0 0 30px rgba(255,255,255,.4);position:relative}
.mega-dice-dot{width:18px;height:18px;background:rgba(100,150,220,.4);border-radius:50%}
.mega-dice.fly{animation:megaFly 1s cubic-bezier(.2,.8,.4,1) both}
@keyframes megaFly{0%{opacity:0;transform:translateY(400px) rotate(-20deg) scale(.3)}50%{opacity:1;transform:translateY(-80px) rotate(340deg) scale(1.12)}75%{transform:translateY(-80px) rotate(360deg) scale(.96)}100%{transform:translateY(-85px) rotate(365deg) scale(1)}}
.mega-dice.hover{animation:megaHover .7s ease-in-out infinite alternate}
@keyframes megaHover{from{transform:translateY(-85px)}to{transform:translateY(-100px)}}
.mega-dice.land{animation:megaLand .55s cubic-bezier(.34,1.56,.64,1) both}
@keyframes megaLand{0%{transform:translateY(-85px) scale(1)}35%{transform:translateY(14px) scale(1.25)}60%{transform:translateY(-10px) scale(.93)}80%{transform:translateY(5px) scale(1.06)}100%{transform:translateY(0) scale(1)}}
.mega-color-name{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:900;letter-spacing:2px;color:#fff;text-transform:uppercase;white-space:nowrap;opacity:0;transition:opacity .3s ease}
.mega-dice.revealed .mega-color-name{opacity:1}
.mega-progress{display:flex;gap:8px;position:relative;z-index:1}
.mega-pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);transition:all .3s ease}
.mega-pip.done{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8);transform:scale(1.2)}
.mega-close{padding:12px 36px;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.35);border-radius:14px;font-size:16px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;cursor:pointer;opacity:0;transition:opacity .4s ease,background .2s;position:relative;z-index:1}
.mega-close:hover{background:rgba(255,255,255,.22)}
.mega-close.show{opacity:1}

.impact{position:fixed;pointer-events:none;z-index:201;border-radius:50%;transform:translate(-50%,-50%) scale(0);animation:impactBurst .55s ease-out both}
@keyframes impactBurst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}60%{transform:translate(-50%,-50%) scale(1.8);opacity:.5}100%{transform:translate(-50%,-50%) scale(3);opacity:0}}
.star-particle{position:fixed;pointer-events:none;z-index:202;animation:starFly .9s ease-out both}
@keyframes starFly{0%{transform:translate(0,0) scale(1.2);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.ring-particle{position:fixed;pointer-events:none;z-index:201;border-radius:50%;border:3px solid;transform:translate(-50%,-50%) scale(0);animation:ringExpand .6s ease-out both}
@keyframes ringExpand{0%{transform:translate(-50%,-50%) scale(0);opacity:.8}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
</style>
</head>
<body>

<div class="sound-wrap">
  <button class="sound-btn" id="soundBtn" onclick="toggleSound()">
    <span id="soundIcon">🔊</span>
    <div class="sttrack"><div class="stthumb"></div></div>
  </button>
  <div class="bgs-panel bgs">
    <button class="bg-btn on" style="background:#3aabf0"                                          onclick="bg(this,'#3aabf0')">☀️</button>

    <button class="bg-btn"    style="background:linear-gradient(135deg,#000000,#ff0040,#ff6600)" onclick="bg(this,'linear-gradient(160deg,#000,#ff0040,#ff6600)')">🔥</button>
    <button class="bg-btn"    style="background:linear-gradient(135deg,#003366,#0066ff,#00ccff)" onclick="bg(this,'linear-gradient(160deg,#003366,#0066ff,#00ccff)')">🌊</button>
    <button class="bg-btn"    style="background:linear-gradient(135deg,#ff006a,#ff6b00,#ffe600,#00e5ff,#a800ff)" onclick="bg(this,'linear-gradient(160deg,#ff006a,#ff6b00,#ffe600,#00e5ff,#a800ff)','brainrot')">🗿</button>
    <button class="bg-btn"    style="background:linear-gradient(135deg,#0a0000,#3a0000,#8b0000)" onclick="bg(this,'linear-gradient(160deg,#0a0000,#3a0000,#8b0000)','ghoul')">👁️</button>
  </div>
</div>

<h1>🎲 Color Dice</h1>

const COLORS={

    {n:'Yellow',h:'#F5C400',d:'Deal?',w:5},{n:'Green',h:'#2E7D32',d:'Fair Trade',w:5},
    {n:'Blue',h:'#1565C0',d:'Last Offer',w:5},{n:'Purple',h:'#8B2FC9',d:'Add More',w:5},
    {n:'Pink',h:'#E91E8C',d:'Wild Card',w:5},{n:'Teal',h:'#00897B',d:'Counter',w:5},

  ],
  warm:[
    {n:'Red',h:'#E53935',d:'L trade',w:5},{n:'Orange',h:'#FF6F00',d:'No Thanks',w:5},
    {n:'Yellow',h:'#F5C400',d:'Deal?',w:5},{n:'Pink',h:'#E91E8C',d:'Wild Card',w:5},
    {n:'Coral',h:'#FF6F61',d:'Maybe',w:5},{n:'Gold',h:'#FFD700',d:'Jackpot',w:5}
  ],
  cool:[

  const colors=COLORS[document.getElementById('mode').value];

  renderPanel(unique.map(c=>c.n));
}

function landMegaDie(idx,color){return new Promise(resolve=>{const el=document.getElementById('md-'+idx);if(!el)return resolve();el.classList.remove('hover');el.style.background=color.h;el.style.boxShadow=`0 0 70px ${color.h},0 0 140px ${color.h}88,inset -5px -5px 0 rgba(0,0,0,.15),inset 5px 5px 0 rgba(255,255,255,.2)`;el.style.borderColor='#fff';const dot=el.querySelector('.mega-dice-dot');if(dot)dot.style.background='rgba(255,255,255,.88)';el.classList.add('land','revealed');const nm=document.getElementById('mn-'+idx);if(nm)nm.textContent=color.n;const ov=document.getElementById('megaOverlay');ov.classList.remove('shake');void ov.offsetWidth;ov.classList.add('shake');const rect=el.getBoundingClientRect();const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;spawnImpact(cx,cy,color.h);spawnRing(cx,cy,color.h);spawnStars(cx,cy,12);playDiceLand(color.h);setTimeout(resolve,500);});}
function spawnImpact(x,y,hex){const el=document.createElement('div');el.className='impact';el.style.cssText=`left:${x}px;top:${y}px;width:220px;height:220px;background:radial-gradient(circle,${hex}bb 0%,transparent 70%)`;document.body.appendChild(el);setTimeout(()=>el.remove(),650);}
function spawnRing(x,y,hex){for(let r=0;r<2;r++)setTimeout(()=>{const el=document.createElement('div');el.className='ring-particle';el.style.cssText=`left:${x}px;top:${y}px;width:160px;height:160px;border-color:${hex}`;document.body.appendChild(el);setTimeout(()=>el.remove(),700);},r*120);}
function spawnStars(x,y,count){const EM=['✨','⭐','💫','🌟','✦','★','🎯','💥'];for(let i=0;i<count;i++){const el=document.createElement('div');el.className='star-particle';el.textContent=EM[Math.floor(Math.random()*EM.length)];const angle=i/count*Math.PI*2+Math.random()*.3,dist=70+110*Math.random();el.style.cssText=`left:${x}px;top:${y}px;font-size:${14+Math.random()*12}px;animation-delay:${Math.random()*120}ms`;el.style.setProperty('--dx',Math.cos(angle)*dist+'px');el.style.setProperty('--dy',Math.sin(angle)*dist+'px');document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}}
function closeMega(){document.getElementById('megaOverlay').classList.remove('show');document.getElementById('megaDiceRow').innerHTML='';document.getElementById('megaProgress').innerHTML='';megaRolling=false;document.getElementById('btnMega').disabled=false;document.getElementById('btnRoll').disabled=false;}

roll();
</script>
